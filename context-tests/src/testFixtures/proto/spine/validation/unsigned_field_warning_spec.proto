syntax = "proto3";

package spine.validation.stubs;

import "spine/options.proto";

option (type_url_prefix) = "type.spine.io";
option java_package = "io.spine.tools.validation.given";
option java_outer_classname = "UnsignedFieldWarningSpecProto";
option java_multiple_files = true;

// A message used by `UnsignedFieldWarningSpec` to verify that the
// `validation.java.suppressWarnings.unsignedFields` flag, written by the
// Validation Gradle plugin as `JavaValidationRendererSettings`, correctly
// toggles the "unsigned integer types are not supported in Java" warning
// emitted by `JavaValidationRenderer` -> `BoundedFieldGenerator` during
// code generation.
message UnsignedWithRange {

    // A `uint32` field constrained by `(range)` — the exact shape that
    // triggers the unsigned-integer warning.
    uint32 value = 1 [(range).value = "[0 .. 100]"];
}
