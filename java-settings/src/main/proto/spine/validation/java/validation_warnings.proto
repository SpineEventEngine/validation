syntax = "proto3";

package spine.validation.java;

import "spine/options.proto";

option (type_url_prefix) = "type.spine.io";
option java_package = "io.spine.tools.validation.settings";
option java_outer_classname = "ValidationWarningsProto";
option java_multiple_files = true;

// Per-kind toggles for warnings emitted by the Java target of
// the Validation Compiler.
//
// The Gradle plugin writes this message to the Compiler settings directory.
// Each flag is independent and defaults to `true` (warning enabled) on the
// DSL side; the Gradle plugin always writes an explicit value, so the
// renderer never has to distinguish "field absent" from "field set to false".
//
// If no settings file is present at all (e.g., the renderer is invoked
// outside of the Validation Gradle plugin), the renderer treats every flag
// as enabled — preserving the historical "always warn" behavior.
//
message ValidationWarnings {

    // Emit the "unsigned integer types are not supported in Java" warning
    // for `uint32`/`uint64` fields constrained by `(range)`, `(min)`, or
    // `(max)`.
    //
    // Set to `false` in the Gradle DSL via
    // `validation.java.warnings.unsignedFields` to keep the build console
    // clean when unsigned integers are used intentionally.
    //
    bool unsigned_fields = 1;
}
